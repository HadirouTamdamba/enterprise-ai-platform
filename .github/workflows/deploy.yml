name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [staging, production]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}   # environments carry approvals & secrets
    steps:
      - uses: actions/checkout@v4
      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > ~/.kube/config
      - name: Apply manifests
        run: kubectl apply -k kubernetes/
      - name: Wait for rollout
        run: |
          kubectl -n eap rollout status deployment/backend --timeout=300s
          kubectl -n eap rollout status deployment/frontend --timeout=300s
      - name: Smoke test
        run: |
          kubectl -n eap run smoke --rm -i --restart=Never --image=curlimages/curl -- \
            -sf http://backend:8000/api/v1/health/ready
