name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with: { python-version: "3.12" }
      - name: Install linters
        run: pip install ruff bandit
      - name: Ruff
        run: ruff check backend/app
      - name: Bandit security scan
        run: bandit -c backend/bandit.yaml -r backend/app -q

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with: { python-version: "3.12" }
      - name: Install backend
        working-directory: backend
        run: pip install -e ".[dev]"
      - name: Run tests with coverage
        working-directory: backend
        run: pytest ../tests/backend -v --cov=app --cov-report=xml --cov-report=term
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: backend/coverage.xml

  ai-evaluation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with: { python-version: "3.12" }
      - name: Install backend
        working-directory: backend
        run: pip install -e .
      - name: Run AI evaluation suites (offline, deterministic)
        working-directory: backend
        env: { PYTHONPATH: ".." }
        run: python -m evaluation.run_all

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: npm, cache-dependency-path: frontend/package.json }
      - name: Install
        working-directory: frontend
        run: npm install
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Build
        working-directory: frontend
        run: npm run build
