apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: eap
spec:
  replicas: 3
  selector:
    matchLabels: { app: backend }
  template:
    metadata:
      labels: { app: backend }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: /metrics
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: backend
          image: ghcr.io/hadiroutamdamba/eap-backend:latest
          ports: [{ containerPort: 8000 }]
          envFrom:
            - configMapRef: { name: eap-config }
            - secretRef: { name: eap-secrets }
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits: { cpu: "1", memory: 1Gi }
          livenessProbe:
            httpGet: { path: /api/v1/health/live, port: 8000 }
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet: { path: /api/v1/health/ready, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - { name: uploads, mountPath: /srv/data/uploads }
      volumes:
        - name: uploads
          persistentVolumeClaim: { claimName: eap-uploads }
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: eap
spec:
  selector: { app: backend }
  ports: [{ port: 8000, targetPort: 8000 }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend
  namespace: eap
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: backend }
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend
  namespace: eap
spec:
  minAvailable: 2
  selector:
    matchLabels: { app: backend }
