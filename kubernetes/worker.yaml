apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: eap
spec:
  replicas: 2
  selector:
    matchLabels: { app: worker }
  template:
    metadata:
      labels: { app: worker }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: worker
          image: ghcr.io/hadiroutamdamba/eap-worker:latest
          envFrom:
            - configMapRef: { name: eap-config }
            - secretRef: { name: eap-secrets }
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits: { cpu: "2", memory: 2Gi }
          volumeMounts:
            - { name: uploads, mountPath: /srv/data/uploads }
      volumes:
        - name: uploads
          persistentVolumeClaim: { claimName: eap-uploads }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: worker
  namespace: eap
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: worker }
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 75 }
