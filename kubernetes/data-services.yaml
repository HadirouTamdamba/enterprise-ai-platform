# Stateful dependencies. In managed clouds, prefer RDS/CloudSQL + Qdrant Cloud;
# these manifests support fully self-hosted deployments.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: eap
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports: [{ containerPort: 5432 }]
          envFrom:
            - secretRef: { name: eap-secrets }
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
          resources:
            requests: { cpu: 500m, memory: 1Gi }
            limits: { cpu: "2", memory: 4Gi }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: [ReadWriteOnce]
        resources: { requests: { storage: 50Gi } }
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: eap
spec:
  selector: { app: postgres }
  ports: [{ port: 5432 }]
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qdrant
  namespace: eap
spec:
  serviceName: qdrant
  replicas: 1
  selector:
    matchLabels: { app: qdrant }
  template:
    metadata:
      labels: { app: qdrant }
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:v1.9.7
          ports: [{ containerPort: 6333 }]
          volumeMounts:
            - { name: storage, mountPath: /qdrant/storage }
          resources:
            requests: { cpu: 500m, memory: 1Gi }
            limits: { cpu: "2", memory: 4Gi }
  volumeClaimTemplates:
    - metadata: { name: storage }
      spec:
        accessModes: [ReadWriteOnce]
        resources: { requests: { storage: 50Gi } }
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: eap
spec:
  selector: { app: qdrant }
  ports: [{ port: 6333 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: eap
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
          ports: [{ containerPort: 6379 }]
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 500m, memory: 768Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: eap
spec:
  selector: { app: redis }
  ports: [{ port: 6379 }]
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: eap-uploads
  namespace: eap
spec:
  accessModes: [ReadWriteMany]
  resources: { requests: { storage: 100Gi } }
