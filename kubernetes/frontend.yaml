apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: eap
spec:
  replicas: 2
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
        - name: frontend
          image: ghcr.io/hadiroutamdamba/eap-frontend:latest
          ports: [{ containerPort: 3000 }]
          env:
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef: { name: eap-config, key: PUBLIC_API_URL }
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 500m, memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: eap
spec:
  selector: { app: frontend }
  ports: [{ port: 3000, targetPort: 3000 }]
