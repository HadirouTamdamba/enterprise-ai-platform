name: conversation_compression
version: 1
description: Context compression — summarize older conversation turns to fit the context window.
model_hint: claude-haiku-4-5-20251001
variables: [conversation]
changelog: Initial version
template: |
  Summarize the following conversation for use as running memory.
  Preserve: decisions taken, facts established, user preferences, open questions.
  Discard: greetings, repetitions, abandoned tangents.
  Maximum 200 words.

  Conversation:
  {{conversation}}
